name: Smoke trace-codex

# End-to-end smoke test for the trace-codex plugin against a published release.
# Installs Codex + the plugin from the marketplace, runs a real `codex exec`
# session with tracing pointed at a local mock Braintrust collector, and asserts
# at least one trace row was reported.
#
# Two entry points:
#   - workflow_call: invoked by release.yaml after a successful release, with the
#     version it just published.
#   - workflow_dispatch: run manually from the Actions tab against any published
#     release version (e.g. to retest an older release).

on:
  workflow_call:
    inputs:
      version:
        description: "Published release version to test, e.g. 0.0.1 (with or without leading v)."
        required: true
        type: string
    secrets:
      openai_api_key:
        description: "OpenAI API key used by codex exec."
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Published release version to test, e.g. 0.0.1 (with or without leading v)."
        required: true
        type: string

permissions:
  contents: read

env:
  PLUGIN_DIR: plugins/trace-codex

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-x64
          - runner: macos-15
            label: darwin-arm64
          - runner: macos-15-intel
            label: darwin-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.PLUGIN_DIR }}/pnpm-lock.yaml

      - name: Install plugin dependencies
        working-directory: ${{ env.PLUGIN_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install trace-codex plugin from the marketplace
        env:
          # The release repo is private; the launcher downloads the binary using
          # this token. `codex plugin` also uses gh credentials for the clone.
          GH_TOKEN: ${{ github.token }}
        run: |
          codex plugin marketplace add braintrustdata/braintrust-codex-plugin
          codex plugin add trace-codex@braintrust-codex-plugins

      - name: Run smoke test (${{ matrix.label }})
        working-directory: ${{ env.PLUGIN_DIR }}
        env:
          OPENAI_API_KEY: ${{ secrets.openai_api_key || secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          SMOKE_RELEASE_VERSION: ${{ inputs.version }}
        run: sh scripts/smoke-test.sh
